<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title|default:"Savings" }} | FinCore</title>
    <style>
        :root {
            --bg: #f4efe6;
            --bg-accent: #efe2c7;
            --ink: #1d2b24;
            --muted: #5e6c65;
            --panel: rgba(255, 252, 246, 0.88);
            --line: rgba(35, 55, 45, 0.12);
            --emerald: #0f7b63;
            --emerald-deep: #0a5e4c;
            --gold: #c08728;
            --rose: #b74d45;
            --shadow: 0 20px 60px rgba(45, 52, 48, 0.12);
            --radius-lg: 28px;
            --radius-md: 18px;
            --radius-sm: 12px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Trebuchet MS", "Segoe UI Variable", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(192, 135, 40, 0.22), transparent 26rem),
                radial-gradient(circle at top right, rgba(15, 123, 99, 0.20), transparent 22rem),
                linear-gradient(180deg, #fcf8ef 0%, var(--bg) 48%, #efe7d8 100%);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .shell {
            width: min(1180px, calc(100% - 2rem));
            margin: 0 auto;
            padding: 2rem 0 3rem;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--emerald-deep);
        }

        .brand-mark {
            width: 2.35rem;
            height: 2.35rem;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--emerald));
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.45);
        }

        .hero,
        .panel,
        dialog {
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .hero {
            background: linear-gradient(145deg, rgba(255, 253, 249, 0.96), rgba(244, 239, 229, 0.88));
            border-radius: var(--radius-lg);
            padding: 1.6rem;
            margin-bottom: 1.4rem;
        }

        .hero h1,
        .panel h2,
        .panel h3,
        dialog h2 {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            letter-spacing: 0.01em;
        }

        .hero p,
        .muted,
        .eyebrow,
        th,
        td,
        label,
        input,
        textarea,
        button {
            font-size: 0.98rem;
        }

        .eyebrow {
            margin: 0 0 0.55rem;
            color: var(--emerald-deep);
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .hero-copy {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: space-between;
            align-items: end;
        }

        .hero-copy p {
            color: var(--muted);
            margin: 0.75rem 0 0;
            max-width: 44rem;
            line-height: 1.6;
        }

        .stat-grid,
        .card-grid {
            display: grid;
            gap: 1rem;
        }

        .stat-grid {
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            margin-top: 1.25rem;
        }

        .card-grid {
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        }

        .panel {
            background: var(--panel);
            border-radius: var(--radius-md);
            padding: 1.2rem;
        }

        .kpi {
            display: grid;
            gap: 0.4rem;
        }

        .kpi .label {
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.78rem;
            font-weight: 700;
        }

        .kpi .value {
            font-size: clamp(1.55rem, 3.8vw, 2.4rem);
            font-weight: 700;
        }

        .stack {
            display: grid;
            gap: 1rem;
        }

        .cluster {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .button,
        button,
        input,
        textarea {
            font: inherit;
        }

        .button,
        button[type="submit"] {
            cursor: pointer;
            border: 0;
            border-radius: 999px;
            padding: 0.9rem 1.1rem;
            font-weight: 700;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        .button-primary {
            background: linear-gradient(135deg, var(--emerald), var(--emerald-deep));
            color: #fff;
            box-shadow: 0 12px 28px rgba(15, 123, 99, 0.25);
        }

        .button-warm {
            background: linear-gradient(135deg, #d49a3e, var(--gold));
            color: #221d15;
            box-shadow: 0 12px 28px rgba(192, 135, 40, 0.22);
        }

        .button-ghost {
            background: rgba(255, 255, 255, 0.62);
            color: var(--ink);
            border: 1px solid var(--line);
        }

        .button:hover,
        button[type="submit"]:hover {
            transform: translateY(-1px);
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.38rem 0.7rem;
            border-radius: 999px;
            border: 1px solid rgba(15, 123, 99, 0.16);
            background: rgba(15, 123, 99, 0.1);
            color: var(--emerald-deep);
            font-weight: 700;
            font-size: 0.82rem;
            text-transform: capitalize;
        }

        .pill.inactive,
        .pill.closed {
            border-color: rgba(183, 77, 69, 0.16);
            background: rgba(183, 77, 69, 0.1);
            color: var(--rose);
        }

        .pill.pending {
            border-color: rgba(192, 135, 40, 0.2);
            background: rgba(192, 135, 40, 0.12);
            color: #8a6117;
        }

        .badge {
            display: inline-flex;
            padding: 0.28rem 0.6rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: capitalize;
        }

        .badge.deposit {
            color: var(--emerald-deep);
            background: rgba(15, 123, 99, 0.12);
        }

        .badge.withdrawal {
            color: var(--rose);
            background: rgba(183, 77, 69, 0.12);
        }

        .messages {
            display: grid;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .message {
            border-radius: var(--radius-sm);
            padding: 0.95rem 1rem;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.75);
        }

        .message.success {
            border-color: rgba(15, 123, 99, 0.24);
            background: rgba(15, 123, 99, 0.12);
        }

        .message.error {
            border-color: rgba(183, 77, 69, 0.24);
            background: rgba(183, 77, 69, 0.1);
        }

        .search-row,
        .form-grid {
            display: grid;
            gap: 0.9rem;
        }

        .search-row {
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: end;
        }

        .field,
        .field-list {
            display: grid;
            gap: 0.45rem;
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid rgba(35, 55, 45, 0.16);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.86);
            padding: 0.85rem 0.95rem;
            color: var(--ink);
        }

        textarea {
            resize: vertical;
        }

        .field-errors {
            color: var(--rose);
            margin: 0;
            padding-left: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            text-align: left;
            padding: 0.9rem 0.45rem;
            border-bottom: 1px solid rgba(35, 55, 45, 0.09);
            vertical-align: top;
        }

        th {
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.74rem;
        }

        .table-wrap {
            overflow-x: auto;
        }

        .meta-list {
            display: grid;
            gap: 0.75rem;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            border-bottom: 1px solid rgba(35, 55, 45, 0.08);
            padding-bottom: 0.65rem;
        }

        .meta-row:last-child {
            border-bottom: 0;
            padding-bottom: 0;
        }

        .empty {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--muted);
        }

        dialog {
            width: min(36rem, calc(100vw - 2rem));
            border-radius: var(--radius-md);
            padding: 0;
            background: linear-gradient(180deg, rgba(255, 252, 246, 0.98), rgba(246, 239, 226, 0.96));
        }

        dialog::backdrop {
            background: rgba(21, 25, 22, 0.38);
            backdrop-filter: blur(6px);
        }

        .modal-header,
        .modal-body {
            padding: 1.2rem 1.2rem 0;
        }

        .modal-footer {
            padding: 1.2rem;
            display: flex;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .modal-close {
            background: transparent;
            border: 0;
            color: var(--muted);
            font-weight: 700;
            padding: 0;
        }

        .pager {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: center;
            margin-top: 1rem;
            color: var(--muted);
        }

        @media (max-width: 720px) {
            .shell {
                width: min(100% - 1rem, 100%);
                padding-top: 1rem;
            }

            .search-row {
                grid-template-columns: 1fr;
            }

            .hero,
            .panel {
                padding: 1rem;
            }

            .meta-row {
                flex-direction: column;
                gap: 0.35rem;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <div class="topbar">
            <a class="brand" href="{% url 'savings_web:account-list' %}">
                <span class="brand-mark" aria-hidden="true"></span>
                <span>FinCore Savings Desk</span>
            </a>
        </div>

        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message {{ message.tags|default:'info' }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <script>
        document.querySelectorAll("[data-dialog-open]").forEach((button) => {
            button.addEventListener("click", () => {
                const dialog = document.getElementById(button.dataset.dialogOpen);
                if (dialog && typeof dialog.showModal === "function") {
                    dialog.showModal();
                }
            });
        });

        document.querySelectorAll("[data-dialog-close]").forEach((button) => {
            button.addEventListener("click", () => {
                const dialog = button.closest("dialog");
                if (dialog) {
                    dialog.close();
                }
            });
        });
    </script>
</body>
</html>
