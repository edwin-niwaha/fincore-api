<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title|default:"Transactions" }} | FinCore</title>
    <style>
        :root {
            --bg: #f5f6f8;
            --panel: #ffffff;
            --ink: #18202d;
            --muted: #627081;
            --line: rgba(24, 32, 45, 0.10);
            --navy: #244166;
            --green: #1f7b63;
            --amber: #b77b1d;
            --rose: #b05360;
            --shadow: 0 18px 40px rgba(25, 34, 45, 0.08);
            --radius-lg: 22px;
            --radius-md: 16px;
            --radius-sm: 12px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI Variable", "Trebuchet MS", sans-serif;
            color: var(--ink);
            background:
                linear-gradient(180deg, rgba(36, 65, 102, 0.05), transparent 18rem),
                linear-gradient(180deg, #fafbfd 0%, #f5f6f8 45%, #eceff3 100%);
        }

        a { color: inherit; text-decoration: none; }

        .shell {
            width: min(1320px, calc(100% - 2rem));
            margin: 0 auto;
            padding: 1.8rem 0 2.8rem;
        }

        .topbar,
        .hero-copy,
        .cluster {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .topbar,
        .hero-copy {
            justify-content: space-between;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            color: var(--navy);
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .brand-mark {
            width: 2.35rem;
            height: 2.35rem;
            border-radius: 0.7rem;
            background: linear-gradient(135deg, var(--navy), var(--green));
        }

        .hero,
        .panel,
        .drawer {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            border-radius: var(--radius-lg);
        }

        .hero {
            padding: 1.4rem;
            margin: 1.2rem 0;
        }

        .hero h1,
        .panel h2,
        .drawer h2 {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
        }

        .eyebrow {
            margin: 0 0 0.45rem;
            color: var(--navy);
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 0.82rem;
        }

        .muted { color: var(--muted); line-height: 1.6; }

        .stat-grid,
        .filter-grid,
        .ledger-layout {
            display: grid;
            gap: 1rem;
        }

        .stat-grid {
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            margin-top: 1.15rem;
        }

        .filter-grid {
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        }

        .ledger-layout {
            grid-template-columns: minmax(0, 1fr);
            align-items: start;
        }

        .ledger-layout.has-drawer {
            grid-template-columns: minmax(0, 1fr) 340px;
        }

        .panel,
        .drawer { padding: 1.1rem; }

        .kpi { display: grid; gap: 0.35rem; }
        .kpi .label {
            font-size: 0.76rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 700;
        }
        .kpi .value {
            font-size: clamp(1.45rem, 3vw, 2.25rem);
            font-weight: 700;
        }

        .button,
        button,
        input,
        select {
            font: inherit;
        }

        .button,
        button[type="submit"] {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            border: 0;
            border-radius: 999px;
            padding: 0.82rem 1.05rem;
            cursor: pointer;
            font-weight: 700;
        }

        .button-primary {
            background: linear-gradient(135deg, var(--navy), #365e93);
            color: #fff;
        }

        .button-ghost {
            background: #fff;
            color: var(--ink);
            border: 1px solid var(--line);
        }

        .button-print {
            background: linear-gradient(135deg, var(--green), #2e9177);
            color: #fff;
        }

        .pill,
        .badge {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            font-weight: 700;
        }

        .pill {
            padding: 0.36rem 0.7rem;
            background: rgba(36, 65, 102, 0.08);
            color: var(--navy);
            border: 1px solid rgba(36, 65, 102, 0.12);
            font-size: 0.82rem;
        }

        .badge.credit {
            background: rgba(31, 123, 99, 0.12);
            color: var(--green);
            padding: 0.28rem 0.58rem;
            font-size: 0.8rem;
        }

        .badge.debit {
            background: rgba(176, 83, 96, 0.11);
            color: var(--rose);
            padding: 0.28rem 0.58rem;
            font-size: 0.8rem;
        }

        .messages {
            display: grid;
            gap: 0.75rem;
        }

        .message {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            padding: 0.92rem 1rem;
        }

        .field { display: grid; gap: 0.4rem; }

        input,
        select {
            width: 100%;
            border: 1px solid rgba(24, 32, 45, 0.14);
            border-radius: 12px;
            background: #fff;
            color: var(--ink);
            padding: 0.78rem 0.88rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 0.88rem 0.5rem;
            border-bottom: 1px solid rgba(24, 32, 45, 0.08);
            text-align: left;
            vertical-align: top;
        }

        th {
            font-size: 0.74rem;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .table-wrap { overflow-x: auto; }

        .drawer {
            position: sticky;
            top: 1rem;
        }

        .drawer .meta-list {
            display: grid;
            gap: 0.75rem;
        }

        .drawer .meta-row {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            border-bottom: 1px solid rgba(24, 32, 45, 0.08);
            padding-bottom: 0.65rem;
        }

        .drawer .meta-row:last-child {
            border-bottom: 0;
            padding-bottom: 0;
        }

        .monospace {
            font-family: "Consolas", "Menlo", monospace;
            font-size: 0.94rem;
        }

        .empty {
            text-align: center;
            color: var(--muted);
            padding: 2rem 1rem;
        }

        .no-print { display: inherit; }

        @media (max-width: 980px) {
            .ledger-layout.has-drawer {
                grid-template-columns: 1fr;
            }

            .drawer {
                position: static;
            }
        }

        @media print {
            body {
                background: #fff;
            }

            .shell {
                width: 100%;
                padding: 0;
            }

            .no-print {
                display: none !important;
            }

            .hero,
            .panel,
            .drawer {
                box-shadow: none;
                border-radius: 0;
                background: #fff;
            }

            .ledger-layout.has-drawer {
                grid-template-columns: 1fr;
            }

            .drawer {
                margin-top: 1rem;
                position: static;
                page-break-inside: avoid;
            }

            table {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <div class="topbar no-print">
            <div class="brand">
                <span class="brand-mark" aria-hidden="true"></span>
                <span>FinCore Transaction Ledger</span>
            </div>
        </div>

        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
